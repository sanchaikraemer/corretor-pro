<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#031E2C">
<title>Corretor Pro — recebendo conversa</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 85% -10%,rgba(101,184,232,.18),transparent 32rem),linear-gradient(180deg,#021722,#031E2C);color:#F7FBFC;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}
.box{text-align:center;padding:32px;max-width:430px}
.logo{width:82px;height:82px;border-radius:22px;margin:0 auto 20px;background:url("/logo-direciona-dark.svg?v=__VERSION__") center/cover no-repeat;box-shadow:0 18px 44px rgba(0,0,0,.28)}
h1{font-size:28px;margin:0 0 10px;letter-spacing:-.045em}
p{margin:0;color:#B8CCD3;line-height:1.55}.small{margin-top:14px;font-size:13px;color:#7796A1}
</style>
</head>
<body>
<div class="box">
  <div class="logo" aria-hidden="true"></div>
  <h1>Recebendo conversa...</h1>
  <p>O Corretor Pro está abrindo o ZIP exportado do WhatsApp.</p>
  <p class="small">Se a tela não avançar, abra o app novamente e use Importar ZIP.</p>
</div>
</body>
</html>
