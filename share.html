<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07080d">
<title>Corretor Pro — recebendo conversa</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 0%,rgba(55,232,255,.18),transparent 35%),radial-gradient(circle at 90% 10%,rgba(255,79,216,.14),transparent 32%),#07080d;color:white;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif}
.box{text-align:center;padding:28px;max-width:430px}
.logo{width:78px;height:78px;border-radius:26px;margin:0 auto 18px;display:grid;place-items:center;background:linear-gradient(135deg,#c9ff3b,#37e8ff);color:#07100c;font-size:36px;font-weight:950}
h1{font-size:28px;margin:0 0 10px;letter-spacing:-.04em}
p{margin:0;color:#a7b0c0;line-height:1.45}
.small{margin-top:14px;font-size:13px;color:#dbe5f4}
</style>
</head>
<body>
<div class="box">
  <div class="logo">D</div>
  <h1>Recebendo conversa...</h1>
  <p>O Corretor Pro está abrindo o ZIP exportado do WhatsApp.</p>
  <p class="small">Se a tela não avançar, abra o app novamente e use Importar ZIP.</p>
</div>
</body>
</html>
