<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Corretor Pro — Redesign (Opção D)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Corretor Pro — Redesign (Opção D)
   Tema escuro = igual ao print Opção D
   Tema claro  = mesma estrutura, paleta clara (Opção A)
   ============================================================ */
:root{
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px;
  --shadow:0 1px 2px rgba(8,15,26,.05),0 8px 24px rgba(8,15,26,.06);
  --font:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --display:'Sora','Inter',sans-serif;
}

/* ---------- TEMA ESCURO (Opção D) ---------- */
html[data-theme="dark"]{
  --bg:#0A1119;
  --bg-panel:#0C141E;
  --surface:#101C29;
  --surface-2:#0E1925;
  --surface-hover:#142233;
  --sidebar:#0B1521;
  --sidebar-deep:#081019;
  --border:#1B2A3A;
  --border-soft:#16232F;
  --text:#E7EDF3;
  --text-2:#9CABBB;
  --text-3:#65737F;
  --accent:#FF6B43;
  --accent-2:#FF8A52;
  --accent-soft:rgba(255,107,67,.16);
  --accent-ink:#FF8E63;
  --on-accent:#FFFFFF;
  --hot:#FF6B43;   --hot-bg:rgba(255,107,67,.16);  --hot-ink:#FF916A;
  --warm:#F4A33C;  --warm-bg:rgba(244,163,60,.15);  --warm-ink:#F4B265;
  --cold:#4E8BFF;  --cold-bg:rgba(78,139,255,.15);  --cold-ink:#7FA8FF;
  --green:#27C08A; --green-bg:rgba(39,192,138,.15);  --green-ink:#4FD3A4;
  --teal:#2BB6B0;
  --slate:#6B7C8D; --slate-bg:rgba(107,124,141,.18); --slate-ink:#93A3B3;
  --red:#E0573C;
  --avatar-ring:#1B2A3A;
}
/* ---------- TEMA CLARO (Opção A) ---------- */
html[data-theme="light"]{
  --bg:#EFF1F4;
  --bg-panel:#EFF1F4;
  --surface:#FFFFFF;
  --surface-2:#F7F8FA;
  --surface-hover:#F2F4F7;
  --sidebar:#0F1B2A;
  --sidebar-deep:#0A1422;
  --border:#E5E8EC;
  --border-soft:#ECEEF1;
  --text:#16202E;
  --text-2:#5C6775;
  --text-3:#94A0AD;
  --accent:#F1543B;
  --accent-2:#FF6B4D;
  --accent-soft:rgba(241,84,59,.10);
  --accent-ink:#D6432B;
  --on-accent:#FFFFFF;
  --hot:#F1543B;   --hot-bg:rgba(241,84,59,.10);   --hot-ink:#D6432B;
  --warm:#E0902A;  --warm-bg:rgba(224,144,42,.12); --warm-ink:#B26C13;
  --cold:#3E7BFA;  --cold-bg:rgba(62,123,250,.10); --cold-ink:#2F66C9;
  --green:#1FA971; --green-bg:rgba(31,169,113,.12); --green-ink:#15875A;
  --teal:#1A9E97;
  --slate:#7C8794; --slate-bg:rgba(124,135,148,.14);--slate-ink:#5C6675;
  --red:#D6432B;
  --avatar-ring:#E5E8EC;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;
}
button{font-family:inherit;cursor:pointer}
svg{display:block}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}

/* ===================== APP SHELL ===================== */
.app{display:flex;min-height:100vh}

/* ---------- Sidebar ---------- */
.sidebar{
  width:236px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;padding:18px 14px;gap:8px;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.brand .logo{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;color:#fff;
}
.brand .logo svg{width:21px;height:21px}
.brand .name{font-family:var(--display);font-weight:700;font-size:17px;color:#fff;letter-spacing:-.2px}
.brand .name b{color:var(--accent-2);font-weight:800}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.nav a{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;
  color:rgba(255,255,255,.62);font-weight:500;font-size:13.5px;transition:.15s;
}
.nav a svg{width:18px;height:18px;opacity:.85;flex-shrink:0}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;box-shadow:0 6px 16px -6px var(--accent);
}
.nav a.active svg{opacity:1}
.sidebar-foot{margin-top:auto;padding-top:12px}
.user-card{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:13px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);
}
.user-card img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.user-card .u-name{color:#fff;font-weight:600;font-size:13px;line-height:1.2}
.user-card .u-role{color:rgba(255,255,255,.5);font-size:11.5px}
.user-card .chev{margin-left:auto;color:rgba(255,255,255,.45)}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;gap:16px;padding:16px 26px;
  position:sticky;top:0;z-index:20;background:var(--bg);
  border-bottom:1px solid var(--border-soft);
}
.menu-btn{display:none;background:none;border:none;color:var(--text)}
.search{
  flex:1;max-width:440px;display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;color:var(--text-3);
}
.search svg{width:17px;height:17px}
.search input{
  border:none;background:none;outline:none;color:var(--text);
  font-family:inherit;font-size:13.5px;width:100%;
}
.search input::placeholder{color:var(--text-3)}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{
  width:40px;height:40px;border-radius:11px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-2);display:grid;place-items:center;transition:.15s;position:relative;
}
.icon-btn:hover{background:var(--surface-hover);color:var(--text)}
.icon-btn svg{width:18px;height:18px}
.icon-btn .dot{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.avatar-btn{width:40px;height:40px;border-radius:11px;overflow:hidden;border:1px solid var(--border);padding:0}
.avatar-btn img{width:100%;height:100%;object-fit:cover}
.avt{display:inline-grid;place-items:center;border-radius:50%;color:#fff;font-weight:700;font-family:var(--display);flex-shrink:0;line-height:1;letter-spacing:.3px}

.content{padding:24px 26px 90px;max-width:1320px;width:100%;margin:0 auto}

/* ---------- Page head ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h1{font-family:var(--display);font-size:22px;font-weight:700;margin:0;letter-spacing:-.3px}
.page-head .sub{display:flex;align-items:center;gap:8px;color:var(--text-2);font-size:13px;margin-top:6px}
.page-head .sub svg{width:15px;height:15px}
.pill-select{
  display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--text);font-weight:500;
}
.pill-select svg{width:15px;height:15px;color:var(--text-2)}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-head h2{font-size:15px;font-weight:600;margin:0}
.card-head .hint{font-size:12px;color:var(--text-2)}
.link{color:var(--accent-ink);font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.link svg{width:13px;height:13px}

/* ---------- KPI row ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
.kpi .ic{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;margin-bottom:12px}
.kpi .ic svg{width:18px;height:18px}
.kpi .val{font-family:var(--display);font-size:23px;font-weight:700;letter-spacing:-.5px}
.kpi .lbl{color:var(--text-2);font-size:12.5px;margin-top:2px}
.kpi .delta{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;margin-top:9px;color:var(--green-ink)}
.kpi .delta svg{width:12px;height:12px}

/* ---------- Grid rows ---------- */
.grid-3{display:grid;grid-template-columns:1.05fr 1fr 1fr;gap:16px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px}

/* ---------- Atendimento list ---------- */
.att{display:flex;align-items:center;gap:12px;padding:11px;border-radius:12px;transition:.15s;cursor:pointer}
.att:hover{background:var(--surface-2)}
.att+.att{margin-top:2px}
.att .time{font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;color:var(--text-2);width:42px;flex-shrink:0}
.att img{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
.att .who{min-width:0;flex:1}
.att .who strong{display:block;font-size:13.5px;font-weight:600}
.att .who span{display:block;font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- Chips ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;white-space:nowrap}
.chip.hot{background:var(--hot-bg);color:var(--hot-ink)}
.chip.warm{background:var(--warm-bg);color:var(--warm-ink)}
.chip.cold{background:var(--cold-bg);color:var(--cold-ink)}
.chip.green{background:var(--green-bg);color:var(--green-ink)}
.chip.slate{background:var(--slate-bg);color:var(--slate-ink)}
.tag{display:inline-flex;align-items:center;font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2)}

/* ---------- Donut ---------- */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut{position:relative;flex-shrink:0}
.donut .center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.donut .center .big{font-family:var(--display);font-size:24px;font-weight:700;line-height:1}
.donut .center .small{font-size:9.5px;color:var(--text-2);margin-top:3px;line-height:1.25;max-width:84px;padding:0 4px}
.legend{display:flex;flex-direction:column;gap:9px;flex:1;min-width:0}
.legend .li{display:flex;align-items:center;gap:9px;font-size:12.5px}
.legend .sw{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.legend .li .lg-lbl{color:var(--text-2)}
.legend .li .lg-val{margin-left:auto;font-weight:600}

/* ---------- Funnel ---------- */
.funnel{display:flex;flex-direction:column;gap:13px}
.funnel .fr{display:flex;align-items:center;gap:12px}
.funnel .fr .fl{width:88px;font-size:12.5px;color:var(--text-2);flex-shrink:0}
.funnel .fr .bar{flex:1;height:26px;background:var(--surface-2);border-radius:8px;overflow:hidden}
.funnel .fr .bar span{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.funnel .fr .fv{font-weight:700;font-size:13px;width:34px;text-align:right;flex-shrink:0}

/* ---------- Table ---------- */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);padding:0 10px 12px}
.tbl td{padding:12px 10px;border-top:1px solid var(--border-soft);font-size:13px;vertical-align:middle}
.tbl tr{cursor:pointer}
.tbl tbody tr:hover td{background:var(--surface-2)}
.tbl .lead-cell{display:flex;align-items:center;gap:10px}
.tbl .lead-cell img{width:30px;height:30px;border-radius:50%}
.tbl .lead-cell strong{font-weight:600;font-size:13px}
.tbl .lead-cell small{display:block;color:var(--text-2);font-size:11.5px}
.prio{font-weight:600;font-size:12px}
.prio.alta{color:var(--hot-ink)} .prio.media{color:var(--warm-ink)} .prio.baixa{color:var(--slate-ink)}

/* ---------- Activities bars ---------- */
.acts{display:flex;flex-direction:column;gap:13px;flex:1}
.acts .ar{display:flex;align-items:center;gap:10px;font-size:13px}
.acts .ar .ad{width:8px;height:8px;border-radius:50%}
.acts .ar .av{margin-left:auto;font-weight:600;color:var(--text-2)}

/* ===================== LEAD DETAIL ===================== */
.back-link{display:inline-flex;align-items:center;gap:7px;color:var(--text-2);font-size:13px;font-weight:500;margin-bottom:16px;background:none;border:none;padding:0}
.back-link svg{width:16px;height:16px}
.lead-grid{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
.lead-side .lead-id{text-align:center;padding-bottom:8px}
.lead-side .lead-id img{width:84px;height:84px;border-radius:50%;border:3px solid var(--avatar-ring);margin:0 auto 12px;display:block}
.lead-side .lead-id .lname{font-family:var(--display);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.lead-side .info-list{display:flex;flex-direction:column;gap:14px;margin-top:18px;border-top:1px solid var(--border-soft);padding-top:16px}
.lead-side .info-list .il{display:flex;gap:10px;font-size:12.5px}
.lead-side .info-list .il svg{width:16px;height:16px;color:var(--text-3);flex-shrink:0;margin-top:1px}
.lead-side .info-list .il .il-t{color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.lead-side .info-list .il .il-v{color:var(--text);font-weight:500}
.lead-actions{display:flex;gap:8px;margin-top:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;font-size:13px;padding:11px 16px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn svg{width:15px;height:15px}
.btn.ghost{flex:1}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent;box-shadow:0 8px 18px -8px var(--accent)}
.btn.block{width:100%}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tabs button{background:none;border:none;padding:11px 14px;font-size:13.5px;font-weight:500;color:var(--text-2);position:relative;white-space:nowrap}
.tabs button.active{color:var(--text)}
.tabs button.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;border-radius:2px;background:var(--accent)}

.kv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kv{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:12px;padding:12px 14px}
.kv .k{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--text-3)}
.kv .v{font-weight:600;font-size:14px;margin-top:4px}

.interactions{display:flex;flex-direction:column;gap:4px}
.ix{display:flex;align-items:center;gap:12px;padding:11px;border-radius:12px}
.ix:hover{background:var(--surface-2)}
.ix .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.ix .ico svg{width:16px;height:16px}
.ix .ix-main strong{display:block;font-size:13px;font-weight:600}
.ix .ix-main span{font-size:12px;color:var(--text-2)}
.ix .ix-time{margin-left:auto;font-size:11.5px;color:var(--text-3);white-space:nowrap}

.checklist{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.checklist .ci{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-2)}
.checklist .ci .cb{width:18px;height:18px;border-radius:6px;border:1.5px solid var(--border);display:grid;place-items:center;flex-shrink:0}
.checklist .ci.done{color:var(--text)}
.checklist .ci.done .cb{background:var(--green);border-color:var(--green)}
.checklist .ci.done .cb svg{width:12px;height:12px;color:#fff}

.bairros{display:flex;flex-direction:column;gap:12px}
.bairros .br{display:grid;grid-template-columns:90px 1fr 38px;align-items:center;gap:10px;font-size:12.5px}
.bairros .br .bb{height:8px;background:var(--surface-2);border-radius:6px;overflow:hidden}
.bairros .br .bb span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:6px}
.bairros .br .bv{text-align:right;font-weight:600;color:var(--text-2)}

.next-actions{display:flex;flex-direction:column;gap:12px}
.next-actions .na{display:flex;gap:11px}
.next-actions .na .nd{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--accent)}
.next-actions .na strong{display:block;font-size:13px;font-weight:600}
.next-actions .na span{font-size:12px;color:var(--text-2)}

.tag-row{display:flex;flex-wrap:wrap;gap:8px}

/* ===================== DIAGNÓSTICO ===================== */
.stepper{display:flex;align-items:center;justify-content:space-between;position:relative;margin:8px 4px 26px;padding:0 10px}
.stepper::before{content:"";position:absolute;left:42px;right:42px;top:18px;height:2px;background:var(--border)}
.stepper .step{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1}
.stepper .dot{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;background:var(--surface);border:2px solid var(--border);color:var(--text-3)}
.stepper .step.done .dot{background:var(--accent);border-color:var(--accent);color:#fff}
.stepper .step.active .dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 5px var(--accent-soft)}
.stepper .step .sl{font-size:12px;color:var(--text-2);font-weight:500}
.stepper .step.active .sl,.stepper .step.done .sl{color:var(--text)}

.needs-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.need{display:flex;gap:12px;padding:14px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface-2);cursor:pointer;transition:.15s}
.need:hover{border-color:var(--accent)}
.need.sel{border-color:var(--accent);background:var(--accent-soft)}
.need .ni{width:34px;height:34px;border-radius:10px;background:var(--surface);display:grid;place-items:center;flex-shrink:0;color:var(--accent-ink)}
.need.sel .ni{background:var(--accent);color:#fff}
.need .ni svg{width:18px;height:18px}
.need strong{display:block;font-size:13.5px;font-weight:600}
.need span{font-size:12px;color:var(--text-2)}
.diag-summary .ds{padding:12px 0;border-bottom:1px solid var(--border-soft)}
.diag-summary .ds:last-child{border:none}
.diag-summary .ds .dk{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--text-3)}
.diag-summary .ds .dv{font-weight:600;font-size:13.5px;margin-top:3px}

/* ===================== HISTÓRICO ===================== */
.timeline{position:relative;padding-left:8px}
.tl-day{font-size:12px;font-weight:600;color:var(--text-2);margin:18px 0 12px}
.tl-day:first-child{margin-top:4px}
.tl-item{display:flex;gap:14px;padding:12px;border-radius:13px;border:1px solid var(--border);background:var(--surface-2);margin-bottom:10px;align-items:center}
.tl-item .tl-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex-shrink:0}
.tl-item .tl-ico svg{width:17px;height:17px}
.tl-item .tl-main{flex:1;min-width:0}
.tl-item .tl-main strong{display:block;font-size:13.5px;font-weight:600}
.tl-item .tl-main span{font-size:12.5px;color:var(--text-2)}
.tl-item .tl-time{font-size:12px;color:var(--text-3);font-weight:600;white-space:nowrap}

/* ===================== CONFIGURAÇÕES ===================== */
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}

.form-field input,.form-field select{

  background:var(--surface-2);color:var(--text);font-family:inherit;font-size:13.5px;outline:none;
}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.photo-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.photo-row img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--avatar-ring)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border-soft)}
.toggle-row:last-child{border:none}
.toggle-row .tr-l{font-size:13.5px;font-weight:500}
.switch{width:42px;height:24px;border-radius:999px;background:var(--border);position:relative;flex-shrink:0;transition:.2s;border:none}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on{background:var(--accent)}
.switch.on::after{left:21px}
.switch-lbl{display:flex;align-items:center;gap:9px}
.switch-lbl .sw-txt{font-size:12px;color:var(--green-ink);font-weight:600}
.theme-seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:3px;gap:3px}
.theme-seg button{border:none;background:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-2)}
.theme-seg button.active{background:var(--accent);color:#fff}
.plan-box{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;border-radius:13px;background:var(--surface-2);border:1px solid var(--border-soft)}

/* ---------- Placeholder ---------- */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 20px;color:var(--text-2)}
.placeholder .pi{width:64px;height:64px;border-radius:18px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;margin-bottom:16px}
.placeholder .pi svg{width:30px;height:30px}
.placeholder h2{margin:0 0 6px;font-size:18px;color:var(--text);font-family:var(--display)}

/* ---------- Bottom nav (mobile) ---------- */
.botnav{display:none}

/* ---------- Responsive ---------- */
.scrim{display:none}
@media(max-width:1100px){

  .grid-3{grid-template-columns:1fr 1fr}

}

/* =================== DONUT / RING =================== */
function donut(segments, big, small, size=148, stroke=20){
  const r=(size-stroke)/2, c=2*Math.PI*r, cx=size/2;
  let off=0;
  const total=segments.reduce((a,s)=>a+s.value,0);
  const circles=segments.map(s=>{
    const len=s.value/total*c, gap=c-len;
    const el=`<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${len-2} ${gap+2}" stroke-dashoffset="${-off}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cx})"/>`;
    off+=len; return el;
  }).join('');
  return `<div class="donut" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="${stroke}"/>${circles}</svg>
    <div class="center"><div class="big">${big}</div><div class="small">${small}</div></div></div>`;
}
function ring(percent, big, small, color='var(--accent)', size=148, stroke=18){
  const r=(size-stroke)/2, c=2*Math.PI*r, cx=size/2, len=percent/100*c;
  return `<div class="donut" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 ${cx} ${cx})"/>
    </svg>
    <div class="center"><div class="big">${big}</div><div class="small">${small}</div></div></div>`;
}

/* =================== ROUTER =================== */
let state={view:'dashboard', leadTab:'Resumo'};
function render(){
  const v=document.getElementById('view');
  let html='';
  if(state.view==='dashboard') html=viewDashboard();
  else if(state.view==='lead') html=viewLead(state.leadTab);
  else if(state.view==='config') html=viewConfig();
  else if(state.view==='atendimentos') html=viewDashboard();
  else { const item=NAV.find(n=>n.id===state.view)||{label:'Seção',icon:'dashboard'}; html=viewPlaceholder(item); }
  v.innerHTML=html;
  v.scrollTop=0; window.scrollTo(0,0);
  // active nav
  document.querySelectorAll('#nav a, #botnav a').forEach(a=>a.classList.toggle('active', a.dataset.view===state.view || (state.view==='lead'&&a.dataset.view==='atendimentos')));
  // sync theme controls if present
  syncThemeControls();
}
function go(view){ if(view==='lead'){state.leadTab='Resumo';} state.view=view; document.getElementById('app').classList.remove('nav-open'); render(); }

/* =================== TEMA =================== */
function currentTheme(){ return document.documentElement.getAttribute('data-theme'); }
function applyTheme(t){
  if(t==='system'){ t = matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'; }
  document.documentElement.setAttribute('data-theme',t);
  try{ localStorage.setItem('cp-theme',t); }catch(e){}
  updateThemeBtn(); syncThemeControls();
}
function updateThemeBtn(){
  const b=document.getElementById('theme-btn');
  if(b) b.innerHTML = currentTheme()==='dark'? svg(I.sun,18):svg(I.moon,18);
}
function syncThemeControls(){
  const dark = currentTheme()==='dark';
  const sw=document.getElementById('dark-switch'); if(sw){ sw.classList.toggle('on',dark); const t=document.getElementById('dark-txt'); if(t)t.textContent=dark?'Ativado':'Desativado'; }
  document.querySelectorAll('#theme-seg button').forEach(btn=>btn.classList.toggle('active', btn.dataset.setTheme===currentTheme()));
}

/* =================== BUILD NAV =================== */
document.getElementById('nav').innerHTML = NAV.map(n=>`<a href="#" data-view="${n.id}">${svg(I[n.icon],18)} ${n.label}</a>`).join('');
const BN=[{id:'dashboard',icon:'dashboard',l:'Dashboard'},{id:'atendimentos',icon:'att',l:'Atendimentos'},{fab:true},{id:'imoveis',icon:'build',l:'Imóveis'},{id:'config',icon:'more',l:'Mais'}];
document.getElementById('botnav').innerHTML = BN.map(b=> b.fab? `<a href="#" class="fab" data-add>${svg(I.plus,24)}</a>` : `<a href="#" data-view="${b.id}">${svg(I[b.icon],21)}<span>${b.l}</span></a>`).join('');

/* =================== EVENTS =================== */
document.addEventListener('click',e=>{
  const navA=e.target.closest('[data-view]'); if(navA){e.preventDefault(); go(navA.dataset.view); return;}
  const goEl=e.target.closest('[data-go]'); if(goEl){e.preventDefault(); go(goEl.dataset.go); return;}
  const lt=e.target.closest('[data-leadtab]'); if(lt){e.preventDefault(); state.view='lead'; state.leadTab=lt.dataset.leadtab; render(); return;}
  if(e.target.closest('[data-nav-open]')){document.getElementById('app').classList.add('nav-open'); return;}
  if(e.target.closest('[data-nav-close]')){document.getElementById('app').classList.remove('nav-open'); return;}
  if(e.target.closest('#theme-btn')){applyTheme(currentTheme()==='dark'?'light':'dark'); return;}
  if(e.target.closest('#dark-switch')){applyTheme(currentTheme()==='dark'?'light':'dark'); return;}
  const st=e.target.closest('[data-set-theme]'); if(st){applyTheme(st.dataset.setTheme); return;}
  const need=e.target.closest('[data-need]'); if(need){need.classList.toggle('sel'); return;}
  const tg=e.target.closest('[data-toggle]'); if(tg){tg.classList.toggle('on'); const txt=tg.parentElement.querySelector('.sw-txt'); if(txt)txt.textContent=tg.classList.contains('on')?'Ativado':'Desativado'; return;}
  if(e.target.closest('[data-add]')){e.preventDefault(); go('atendimentos'); return;}
});

/* =================== INIT =================== */
(function init(){
  let t='dark';
  try{ t=localStorage.getItem('cp-theme')||'dark'; }catch(e){}
  const q=new URLSearchParams(location.search);
  if(q.get('theme')) t=q.get('theme');
  if(q.get('view')) state.view=q.get('view');
  if(q.get('tab')){ state.view='lead'; state.leadTab=q.get('tab'); }
  document.documentElement.setAttribute('data-theme', t==='light'?'light':'dark');
  updateThemeBtn();
  render();
})();
</script>
