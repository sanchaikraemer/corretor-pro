<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#065F46">
  <title>Corretor Pro — recebendo conversa</title>
  <style>
    :root{font-family:Poppins,system-ui,sans-serif;color:#1F2937;background:#065F46}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#065F46,#1F2937)}
    main{width:min(100%,380px);text-align:center;background:#fff;padding:34px 26px;border-radius:26px;box-shadow:0 24px 70px rgba(31,41,55,.24)}
    img{width:82px;height:82px;object-fit:contain}
    h1{font-size:24px;margin:18px 0 8px}
    p{font-size:14px;line-height:1.65;color:#6B7280;margin:0}
    a{display:inline-block;margin-top:22px;padding:12px 18px;border-radius:12px;color:#fff;background:#059669;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <main>
    <img src="/logo-mark.png" alt="Corretor Pro">
    <h1>Abra o Corretor Pro</h1>
    <p>Abra o aplicativo uma vez e envie novamente o ZIP exportado do WhatsApp.</p>
    <a href="/">Abrir aplicativo</a>
  </main>
</body>
</html>
